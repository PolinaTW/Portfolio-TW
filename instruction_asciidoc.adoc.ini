= Пробная инструкция на языке asciidoc

== Как подключиться к удаленному репозиторию

=== Вводная информация

[IMPORTANT]: 
====
*Базовая логика docs-as-code*:

. В *локальном репозитории* пользователь создает и обновляет документ на своем ПК.

. В *удаленный репозиторий* — хранилище актуальной документации — передается финальная версия документа.

*Подробнее:*

- Принцип *git* включает работу с документом на разных ветках (_brancs_), позволяющих сравнивать и сохранять версии документа. 

- И в локальном, и в удаленном репозитории основная ветка называется _main_ или _master_, создаваемая автоматически. Другие ветки создает пользователь для _черновых версий_ документа. 

- *Финальная версия* документа в локальном репозитории сохраняется (команда *`commit`*) и отправляется сначала в ветку main/master (команда *`merge`* — слияние веток), затем — в удаленный репозиторий также в ветку main/master — команда *`push`*.

Это базовая схема работы с *git*, на практике используются другие варианты обновления документации по принципу docs-as-code. 
====

ШАГ 1

Регистрация в удаленном репозитории

ШАГ 2

Создание локального репозитория

ШАГ 3

Подключение к удаленному репозиторию

ШАГ 4 

Тестовый push данных в удаленный репозиторий

= Пробная инструкция на языке asciidoc
== Как подключить документацию к удаленному репозиторию
=== Вводная информация_
[IMPORTANT]: 
====
Принцип docs-as-code включает следующую логику:
. 1) Пользователь обновляет документацию в #локальном репозитории№ (на ПК пользователя)
. 2) Финальная версия документации передается пользователем в #удаленный репозиторий# в ветку main/master с помощью команды `push`
. В *локальном репозитории* работа ведется на разных ветках (branchs), позволяющих сравнивать версии документации. По умолчанию, одна из веток - основная, называется main или master. 
Другие ветки создает пользователь для _черновых версий_. Финальная версия в локальном репозитории _мёрджится_ в основную ветку (команда `merge`) перед тем, как отправться в удаленный репозиторий.

==== 
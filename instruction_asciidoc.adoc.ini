== Подключение локального репозитория

*ШАГ 1* 

Открыть терминал в Visual Studio Code (верхнее меню → троеточие → Terminal → New Terminal):

[NOTE]: 
====
Подойдут и другие терминалы — PowerShell, Git Bash, Command Prompt.
====

*ШАГ 2* 

Перейти в папку проекта: 

команда *`cd путь\к\папке\Portfolio-TW`*

*ШАГ 3* 

Инициализировать локальный Git репозиторий:

команда *`git init`*

*ШАГ 4* 

Создать файл README.md

[NOTE]: 
====
Это файл, который содержит описание проекта, инструкции по использованию, технологии
Улучшает профессиональный вид проекта
Помогает другим разработчикам понять назначение проекта
Может использоваться для работы с AI

*Содержимое README*:

*Описание*

Этот репозиторий содержит примеры технической документации и портфолио проектов.

*Технологии*

- Markdown
- HTML
- Git

=== Как использовать

Клонировать репозиторий и открыть файлы в текстовом редакторе.
====

*ШАГ 5* 

Добавить файлы в индекс: 

команда *`git add` . *(для всех файлов) либо *`git add [название файла]`*

*ШАГ 6* 

Создать первый коммит/commit: команда *`git commit -m "Initial commit"`*

*ШАГ 7* 

Переименовать ветку, чтобы они совпадали в репозиториях (например, только main): *`git branch -M main`*

*ШАГ 8* 

Добавить удаленный репозиторий: 

команда *`git remote add origin https://github.com/ВашеИмя/Portfolio-TW.git`*

=== Проверочный push (отправка файлов в GitHub)

*ШАГ 1* 

Отправить файлы в удаленный репозиторий: 

команда *`git push -u origin main`*

[NOTE]: 
====
Первый раз использовать флаг -u (устанавливает upstream ветку)
Возможно, потребуется аутентификация (ввести токен доступа GitHub или пароль)
====

*ШАГ 2*

Проверить результат: 

команда *`git log --oneline`* - должен отобразиться коммит.

*ШАГ 3* 

Проверить на GitHub - обновить страницу репозитория в браузере
В удаленном репозитории должны появиться _запушенные_ файлы (в том числе README.md) либо один файл, который был добавлен в индекс и отправлен с коммитом.
